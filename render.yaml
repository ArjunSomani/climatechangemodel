services:
  - type: worker
    name: climatechangemodel-run-worker
    runtime: python
    plan: free
    rootDir: engine
    buildCommand: pip install -e ".[library]"
    # engine/data/eia_parquet/ is committed to git (see .gitignore) --
    # refresh_eia_data.py is incremental-only and can't bootstrap it from
    # an empty checkout, so no fetch step is needed here.
    startCommand: python scripts/run_worker.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
