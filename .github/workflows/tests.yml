name: Tests

# Enforce golden parity (engine/tests/) on every PR and every push to main.
# The parity suite runs the refactored engine against a frozen 2020-2024 data
# snapshot and asserts it still matches the original engine bit-for-bit, so
# this is the guard that catches any accidental drift in the engine's logic.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/pyproject.toml

      - run: pip install -e ".[dev]"

      - run: pytest tests/ -v
